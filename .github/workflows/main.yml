name: Continuous integration

on:
  push:
    branches: main
  pull_request:
    branches: main
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout project"
        uses: actions/checkout@v4
      - name: "Lint using ruff"
        uses: astral-sh/ruff-action@v3
      - name: "Check types using ty"
        uses: astral-sh/ty-action@v1
  check:
    name: Check types
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout project"
        uses: actions/checkout@v4
      - name: "Set up uv"
        uses: astral-sh/setup-uv@v6
      - name: "Check types using ty"
        run: uvx ty check
  build: 
    name: Build package
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout project"
        uses: actions/checkout@v4
      - name: "Set up uv"
        uses: astral-sh/setup-uv@v6
      - name: "Build using uv"
        run: uv build
